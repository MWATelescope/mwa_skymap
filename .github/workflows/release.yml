# .github/workflows/release.yml
name: Build, publish, and release to test_pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── 1. Test ──────────────────────────────────────────────────────────────
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[dev]"

      # uncomment the below for testing and linting/syntax checks

      #- name: Install dev tools
      #  run: pip install ruff mypy pytest

      #- name: Lint
      #  run: ruff check .

      #- name: Type check
      #  run: mypy mwa_skymap/

      #- name: Run tests
      #  run: pytest --tb=short

  # ── 2. Build ─────────────────────────────────────────────────────────────
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build frontend
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  # ── 3. Publish to PyPI ───────────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build

    permissions:
      id-token: write

    # Use: https://test.pypi.org/project/mwa_skymap/ for the TEST pypi.
    # Use: https://pypi.org/project/mwa_skymap/ for the REAL pypi.
    environment:
      name: pypi
      url: https://test.pypi.org/project/mwa_skymap/

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ── 4. GitHub Release ────────────────────────────────────────────────────
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: publish # only release after a successful PyPI publish

    permissions:
      contents: write # required to create releases and upload assets

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history needed for changelog generation

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true # auto-generates notes from PR titles and commits
          files: dist/* # attaches the sdist and wheel as release assets
          fail_on_unmatched_files: true
